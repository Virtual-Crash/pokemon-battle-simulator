name: Build static site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "static-site"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish build to docs
        run: |
          rm -rf docs
          cp -R dist docs
          touch docs/.nojekyll
          cp docs/index.html index.html
          rm -rf assets
          cp -R docs/assets assets
          touch .nojekyll

      - name: Commit built site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build GitHub Pages site
          file_pattern: docs index.html assets .nojekyll
